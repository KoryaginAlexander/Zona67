ktor {
    deployment {
        port = 8080
        port = ${?PORT}
    }
    application {
        modules = [ com.retailstore.ApplicationKt.module ]
    }
}

database {
    url      = ${DB_URL}
    driver   = "org.postgresql.Driver"
    user     = ${DB_USER}
    password = ${DB_PASSWORD}
}

jwt {
    secret                = ${JWT_SECRET}
    issuer                = "retail-store"
    audience              = "retail-store-users"
    accessTokenTtlMinutes = 15
    refreshTokenTtlDays   = 30
}

firebase {
    credentialsPath = ${?FIREBASE_CREDENTIALS_PATH}
}

admin {
    email = ${?ADMIN_EMAIL}
}
